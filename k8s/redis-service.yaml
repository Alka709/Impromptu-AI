apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: impromptu-ai
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: impromptu-ai
spec:
  # ClusterIP makes the service only reachable from within the cluster
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
