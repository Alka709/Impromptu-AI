apiVersion: v1
kind: Secret
metadata:
  name: impromptu-secret
  namespace: impromptu-ai
  labels:
    app.kubernetes.io/part-of: impromptu-ai
type: Opaque
# IMPORTANT: In a real production environment, you should use a secrets manager
# (like HashiCorp Vault, AWS Secrets Manager, or Sealed Secrets).
# The values below MUST be base64 encoded strings.
stringData:
  # Example: echo -n 'your_api_key' | base64
  # Note: stringData allows us to put plaintext here and Kubernetes will automatically encode it
  
  # AI Service secrets
  GEMINI_API_KEY: "your_gemini_api_key_here"
  
  # Backend secrets
  JWT_SECRET: "WgWTJC4KMW9jRIm4kALkZSBkh99P2osJ1FGjd5vR0H8="
  
  # Database credentials (PostgreSQL / Supabase)
  DATABASE_URL: "postgresql://user:pass@host:5432/db"
  
  # Storage credentials (S3)
  S3_ACCESS_KEY_ID: "your_aws_access_key"
  S3_SECRET_ACCESS_KEY: "your_aws_secret_key"
  S3_BUCKET_NAME: "your_bucket_name"
