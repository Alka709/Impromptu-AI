apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: impromptu-ai
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: impromptu-ai
spec:
  # Redis is used for local cluster state (RQ queues), 
  # so it should remain a single replica to avoid state inconsistencies
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          # For a production deployment with persistent data, 
          # you would mount a PersistentVolumeClaim here.
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
