apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: impromptu-ai
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: impromptu-ai
spec:
  # Internal communication only
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
