apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker-deployment
  namespace: impromptu-ai
  labels:
    app.kubernetes.io/name: ai-worker
    app.kubernetes.io/part-of: impromptu-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-worker
    spec:
      containers:
        - name: ai-worker
          # Uses the exact same image as AI service, but overrides the command to run the RQ worker
          image: ai-service:latest
          imagePullPolicy: IfNotPresent
          # The command assumes RQ is installed and configured in the image
          command: ["rq", "worker", "--worker-class", "rq.SimpleWorker", "-u", "redis://redis-service.impromptu-ai.svc.cluster.local:6379"]
          env:
            - name: REDIS_PORT
              value: "6379"
            - name: BACKEND_INTERNAL_URL
              value: "http://backend-service:3000"
          envFrom:
            - configMapRef:
                name: impromptu-config
            - secretRef:
                name: impromptu-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
