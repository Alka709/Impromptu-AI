apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: impromptu-ai
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: impromptu-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: impromptu-config
            - secretRef:
                name: impromptu-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            # Required when readOnlyRootFilesystem is true, if node writes to /tmp
            # volumeMounts:
            #  - name: tmp
            #    mountPath: /tmp
      # volumes:
      #   - name: tmp
      #     emptyDir: {}
