apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: impromptu-ingress
  namespace: impromptu-ai
  labels:
    app.kubernetes.io/part-of: impromptu-ai
  annotations:
    # Requires an NGINX Ingress controller installed in the cluster
    kubernetes.io/ingress.class: nginx
    # Redirect HTTP to HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Additional proxy configurations can go here
spec:
  # tls:
  #   - hosts:
  #       - impromptu-ai.example.com
  #     secretName: impromptu-tls-secret
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          # Example of routing API requests to the backend if needed:
          # - path: /api
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: backend-service
          #       port:
          #         number: 3000
