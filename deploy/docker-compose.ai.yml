version: '3.8'

services:
  ai-service:
    build:
      context: ../ai_service
    ports:
      - "8000:8000"
    environment:
      # Note: REDIS_HOST, BACKEND_INTERNAL_URL, and BACKEND_HOST should be overridden 
      # via the .env file on this EC2 instance to point to the Private IP of the Backend EC2.
      - REDIS_PORT=6379
      - OTLP_ENDPOINT=http://${BACKEND_HOST}:4319/v1/logs
    env_file:
      - ../ai_service/.env
    networks:
      - ai-network
    restart: unless-stopped

  ai-worker:
    build:
      context: ../ai_service
    # The worker connects directly to the Redis instance on the Backend EC2.
    # REDIS_HOST from the .env file must be the Private IP of the Backend EC2.
    command: ["sh", "-c", "rq worker --worker-class rq.SimpleWorker -u redis://$${REDIS_HOST}:6379"]
    environment:
      - REDIS_PORT=6379
      - BACKEND_INTERNAL_URL=http://${BACKEND_HOST}:4000
      - OTLP_ENDPOINT=http://${BACKEND_HOST}:4319/v1/logs
    env_file:
      - ../ai_service/.env
    networks:
      - ai-network
    deploy:
      replicas: 3
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge
