version: '3.8'

services:
  backend:
    build:
      context: ../backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - OTLP_ENDPOINT=http://otel-collector:4318/v1/logs
      # Note: AI_SERVICE_URL and BACKEND_CALLBACK_URL should be overridden via the .env file 
      # on the EC2 instance to point to the correct public/private IPs.
    env_file:
      - ../backend/.env
    networks:
      - backend-network
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379" # Exposed so the AI EC2 instance can connect via Private IP
    volumes:
      - redis_data:/data
    networks:
      - backend-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4319:4318" # OTLP HTTP receiver (exposed for AI service to connect)
      - "4320:4317" # OTLP gRPC receiver
    networks:
      - backend-network
    depends_on:
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.2
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    networks:
      - backend-network
    depends_on:
      - loki
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge

volumes:
  redis_data:
